<!DOCTYPE html>
<html>
<head>
  <title>JT.vrfs Web</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      scroll-behavior: smooth;

      /* blue gradient */
      background: linear-gradient(to bottom, #0a1f44, #3a86ff);

      /* soccer pattern */
      background-image: radial-gradient(circle at 30px 30px, rgba(255,255,255,0.08) 3px, transparent 3px);
      background-size: 70px 70px;
    }

    h1 {
      font-size: 80px;
      margin-top: 120px;
      text-shadow: 2px 2px 10px black;
    }

    h2 {
      font-size: 60px;
      margin-top: 200px;
      text-shadow: 2px 2px 10px black;
    }

    .section {
      margin-top: 150px;
    }

    a {
      color: white;
      text-decoration: none;
      display: block;
      margin: 15px;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 8px black;
    }

    a:hover {
      text-decoration: underline;
    }

    .arrow {
      font-size: 40px;
      margin: 10px;
    }

    .form-box {
      margin-top: 120px;
      padding: 40px;
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      display: inline-block;
    }

    input {
      display: block;
      margin: 20px auto;
      padding: 15px;
      width: 300px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
    }

    .submit-btn {
      padding: 15px 30px;
      border: none;
      background: white;
      color: #0a1f44;
      font-size: 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }

    .footer {
      margin-top: 150px;
      padding: 40px;
      font-size: 20px;
      background: rgba(0,0,0,0.3);
      text-shadow: 2px 2px 8px black;
    }
  </style>
</head>

<body>

  <h1>Welcome to JT.vrfs Web!</h1>

  <!-- DMA -->
  <div class="section">
    <h2>DMA Tryout Server</h2>
    <a href="https://discord.gg/PGNkHFcHBq">Join the Server</a>
  </div>

  <!-- SOCIALS -->
  <div class="section">
    <h2>SOCIALS</h2>
    <div class="arrow">⬇️</div>

    <a href="https://www.tiktok.com/@jt.vrfs0?is_from_webapp=1&sender_device=pc">
      Follow my TikTok
    </a>

    <a href="https://youtube.com/@jt.vrfs1303?si=ImQGpnoCxI4zmkGp">
      Subscribe to my YouTube
    </a>
  </div>

  <!-- FORM -->
  <div class="form-box">
    <h2 style="font-size:40px;">Enter Giveaway / Video</h2>

    <input id="playerId" type="text" placeholder="Player ID">
    <input id="username" type="text" placeholder="Username">
    <input id="email" type="email" placeholder="Email">

    <button class="submit-btn" onclick="submitForm()">Submit</button>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p>
      JT.vrfs — a soon to be Gold CC. This website will show stuff about him.
      If you want to try out for DMA, join the server and follow me on social media!
    </p>
  </div>

  <script>
    function submitForm() {
      let id = document.getElementById("playerId").value;
      let user = document.getElementById("username").value;
      let email = document.getElementById("email").value;

      console.log("Player ID:", id);
      console.log("Username:", user);
      console.log("Email:", email);

      alert("Submitted! (Check console)");
    }
  </script>

</body>
</html>
