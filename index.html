<!DOCTYPE html>
<html>
<head>
  <title>JT.vrfs Web</title>

  <!-- Google Font for wavy/cool style -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #87CEFA, #bde0fe);
      font-family: 'Pacifico', cursive;
      text-align: center;
      color: white;
      scroll-behavior: smooth;
    }

    h1 {
      font-size: 50px;
      margin-top: 150px;
      text-shadow: 0 0 10px white, 0 0 20px white, 0 0 40px white;
      animation: wave 2s infinite ease-in-out;
    }

    @keyframes wave {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .scroll-btn {
      margin-top: 50px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      background: white;
      color: #333;
      cursor: pointer;
      border-radius: 20px;
    }

    .section {
      margin-top: 300px;
      font-size: 30px;
      text-shadow: 0 0 10px white;
    }

    .socials {
      margin-top: 40px;
      font-size: 20px;
    }

    a {
      color: white;
      text-decoration: none;
      display: block;
      margin: 10px;
    }
  </style>
</head>

<body>

  <h1>Welcome to JT.vrfs Web!</h1>

  <button class="scroll-btn" onclick="scrollDown()">Scroll Down ⬇️</button>

  <div class="section" id="next">
    <p>vrfs soccer team tryout server</p>

    <div class="socials">
      <p>Follow Me:</p>
      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
      <a href="#">YouTube</a>
    </div>
  </div>

  <script>
    function scrollDown() {
      document.getElementById("next").scrollIntoView({ behavior: "smooth" });
    }
  </script>

</body>
</html>
